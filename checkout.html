<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Checkout | PulsePair</title><link rel="stylesheet" href="style.css" /></head>
<body>
<header class="site-header"><div class="container nav-wrap"><a href="index.html" class="logo">PulsePair</a><nav class="main-nav"><a href="index.html#shop">Shop</a><a href="cart.html">Cart</a></nav><div class="nav-actions"><a href="cart.html" class="cart-link">Cart <span id="cartCountHeader" class="badge">0</span></a></div></div></header>
<main class="section"><div class="container checkout-layout"><div><div class="section-head"><h1>Checkout</h1></div><form id="checkoutForm" class="checkout-form">
<label>Full Name<input required name="name" placeholder="Your full name" /></label>
<label>Phone Number<input required name="phone" placeholder="Mobile number" /></label>
<label>Email<input required type="email" name="email" placeholder="Email address" /></label>
<label>Address<textarea required name="address" placeholder="Shipping address"></textarea></label>
<label>Payment Method<select name="payment"><option>Cash on Delivery</option><option>UPI Manual Transfer</option></select></label>
<button class="btn btn-primary" type="submit">Place Order</button>
<p class="tiny-note">This demo checkout stores the order locally and sends you to the success page. Real payment gateway can be added later.</p>
</form></div><aside id="checkoutSummary" class="summary-card"></aside></div></main>
<script src="app.js"></script>
</body></html>
